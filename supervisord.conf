priority=30
stdout_logfile=/home/container/logs/discord-rest-listener.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/home/container/logs/discord-rest-listener-err.log
stderr_logfile_maxbytes=5MB
environment=NODE_ENV="production"

; ---------------------------------------------------------------------------
; bot-presence
; ---------------------------------------------------------------------------
[program:bot-presence]
command=node dist/main.js
directory=/app/services/bot-presence
autostart=true
autorestart=true
